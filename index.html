<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Russian Flashcards</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  ul { list-style: none; padding: 0; }
  li { margin: 0.5rem 0; }
  a { display: block; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 8px; text-decoration: none; color: inherit; }
  a:hover { background: #f5f5f5; }
</style>
</head>
<body>
<h1>Russian Flashcards</h1>
<ul id="list"></ul>
<script>
fetch('students.json')
  .then(r => r.json())
  .then(students => {
    const list = document.getElementById('list');
    for (const s of students) {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = `students/${s.id}/flashcards.html`;
      a.textContent = s.name;
      li.appendChild(a);
      list.appendChild(li);
    }
  });
</script>
</body>
</html>
