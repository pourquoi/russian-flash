<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Russian Flashcards</title>
<script>document.documentElement.dataset.theme = localStorage.getItem('rf-theme') || 'cyberpunk';</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Audiowide&family=VT323&display=swap');

  :root[data-theme="cyberpunk"] {
    --bg: #05050c;
    --surface: #0c0c1e;
    --accent: #00fff2;
    --accent2: #ff2bd6;
    --text: #d8f8ff;
    --muted: #6b7aa8;
    --border: #242a55;
    --glow-1: 0 0 6px rgba(0,255,242,.6), 0 0 18px rgba(0,255,242,.25);
    --card-radius: 0;
    --card-clip: polygon(0 10px, 10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
    --bg-layers:
      radial-gradient(ellipse at top, rgba(0,255,242,.06), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(255,43,214,.06), transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,255,242,.035) 0px, rgba(0,255,242,.035) 1px, transparent 1px, transparent 3px);
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Share Tech Mono', ui-monospace, 'Courier New', monospace;
  }

  :root[data-theme="retro"] {
    --bg: #1a0b2e;
    --surface: #2a1245;
    --accent: #ff2f92;
    --accent2: #ffb347;
    --text: #ffe9f7;
    --muted: #a789c9;
    --border: #5b2a8a;
    --glow-1: 0 0 6px rgba(255,47,146,.6), 0 0 18px rgba(255,47,146,.3);
    --card-radius: 14px;
    --card-clip: none;
    --bg-layers:
      linear-gradient(180deg, #1a0b2e 0%, #3a1256 45%, #a8296b 78%, #ff8a3d 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 4px);
    --font-display: 'Audiowide', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  :root[data-theme="classic"] {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --border: #2e2e4a;
    --glow-1: 0 0 0 rgba(0,0,0,0);
    --card-radius: 8px;
    --card-clip: none;
    --bg-layers: none;
    --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  :root[data-theme="terminal"] {
    --bg: #000502;
    --surface: #001a0a;
    --accent: #33ff33;
    --accent2: #1aff66;
    --text: #b6ffb6;
    --muted: #2f6b2f;
    --border: #144d14;
    --glow-1: 0 0 4px rgba(51,255,51,.7), 0 0 14px rgba(51,255,51,.35);
    --card-radius: 0;
    --card-clip: none;
    --bg-layers:
      repeating-linear-gradient(0deg, rgba(51,255,51,.06) 0px, rgba(51,255,51,.06) 1px, transparent 1px, transparent 2px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.65) 100%);
    --font-display: 'VT323', monospace;
    --font-body: 'VT323', ui-monospace, 'Courier New', monospace;
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg-layers), var(--bg);
    color: var(--text);
    max-width: 480px;
    margin: 4rem auto;
    padding: 0 1rem;
    transition: background .3s ease, color .3s ease;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow-1);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  #themeSelect {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 14px;
    font-size: .8rem;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: .04em;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  #themeSelect:hover { border-color: var(--accent); box-shadow: var(--glow-1); }

  ul { list-style: none; padding: 0; }
  li { margin: 0.6rem 0; }

  a {
    display: block;
    padding: 0.9rem 1.1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    clip-path: var(--card-clip);
    text-decoration: none;
    color: var(--text);
    letter-spacing: .04em;
    transition: border-color .15s, box-shadow .15s, color .15s;
  }
  a:hover {
    border-color: var(--accent);
    box-shadow: var(--glow-1);
    color: var(--accent);
  }
</style>
</head>
<body>
<h1>Russian Flashcards</h1>
<select id="themeSelect">
  <option value="cyberpunk">🌆 Cyberpunk</option>
  <option value="retro">🌴 Retro 80s</option>
  <option value="classic">🟣 Classic</option>
  <option value="terminal">💻 Terminal</option>
</select>
<ul id="list"></ul>
<script>
const themeSelect = document.getElementById('themeSelect');
themeSelect.value = document.documentElement.dataset.theme;
themeSelect.addEventListener('change', () => {
  localStorage.setItem('rf-theme', themeSelect.value);
  document.documentElement.dataset.theme = themeSelect.value;
});

fetch('students.json')
  .then(r => r.json())
  .then(students => {
    const list = document.getElementById('list');
    for (const s of students) {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = `${s.id}/flashcards.html`;
      a.textContent = s.name;
      li.appendChild(a);
      list.appendChild(li);
    }
  });
</script>
</body>
</html>
