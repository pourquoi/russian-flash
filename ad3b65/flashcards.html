<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russian Flashcards</title>
<script>document.documentElement.dataset.theme = localStorage.getItem('rf-theme') || 'retro';</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Share+Tech+Mono&family=Audiowide&family=VT323&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root[data-theme="cyberpunk"] {
    --bg: #05050c;
    --surface: #0c0c1e;
    --surface2: #14142e;
    --surface-green: #05170a;
    --surface-red: #1a0510;
    --accent: #00fff2;
    --accent2: #ff2bd6;
    --green: #39ff14;
    --red: #ff2050;
    --text: #d8f8ff;
    --muted: #6b7aa8;
    --border: #242a55;
    --glow-1: 0 0 6px rgba(0,255,242,.6), 0 0 18px rgba(0,255,242,.25);
    --glow-2: 0 0 6px rgba(255,43,214,.6), 0 0 18px rgba(255,43,214,.25);
    --glow-green: 0 0 16px rgba(57,255,20,.5);
    --glow-red: 0 0 16px rgba(255,32,80,.5);
    --card-radius: 0;
    --card-clip: polygon(0 16px, 16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%);
    --bg-layers:
      radial-gradient(ellipse at top, rgba(0,255,242,.06), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(255,43,214,.06), transparent 60%),
      repeating-linear-gradient(0deg, rgba(0,255,242,.035) 0px, rgba(0,255,242,.035) 1px, transparent 1px, transparent 3px);
    --scanline-opacity: .15;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Share Tech Mono', ui-monospace, 'Courier New', monospace;
    --btn-text-on-accent: #05050c;
  }

  :root[data-theme="retro"] {
    --bg: #1a0b2e;
    --surface: #2a1245;
    --surface2: #3a1a5e;
    --surface-green: #0f2e1c;
    --surface-red: #3a0f22;
    --accent: #ff2f92;
    --accent2: #ffb347;
    --green: #05ffa1;
    --red: #ff4d6d;
    --text: #ffe9f7;
    --muted: #a789c9;
    --border: #5b2a8a;
    --glow-1: 0 0 6px rgba(255,47,146,.6), 0 0 18px rgba(255,47,146,.3);
    --glow-2: 0 0 6px rgba(255,179,71,.6), 0 0 18px rgba(255,179,71,.3);
    --glow-green: 0 0 16px rgba(5,255,161,.5);
    --glow-red: 0 0 16px rgba(255,77,109,.5);
    --card-radius: 18px;
    --card-clip: none;
    --bg-layers:
      linear-gradient(180deg, #1a0b2e 0%, #3a1256 45%, #a8296b 78%, #ff8a3d 100%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 1px, transparent 4px);
    --scanline-opacity: .06;
    --font-display: 'Audiowide', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --btn-text-on-accent: #1a0b2e;
  }

  :root[data-theme="classic"] {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #24243a;
    --surface-green: #0d2e22;
    --surface-red: #3a1a1a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --border: #2e2e4a;
    --glow-1: 0 0 0 rgba(0,0,0,0);
    --glow-2: 0 0 0 rgba(0,0,0,0);
    --glow-green: 0 0 0 rgba(0,0,0,0);
    --glow-red: 0 0 0 rgba(0,0,0,0);
    --card-radius: 18px;
    --card-clip: none;
    --bg-layers: none;
    --scanline-opacity: 0;
    --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --btn-text-on-accent: #ffffff;
  }

  :root[data-theme="terminal"] {
    --bg: #000502;
    --surface: #001a0a;
    --surface2: #00250f;
    --surface-green: #00330f;
    --surface-red: #330505;
    --accent: #33ff33;
    --accent2: #1aff66;
    --green: #33ff33;
    --red: #ff3333;
    --text: #b6ffb6;
    --muted: #2f6b2f;
    --border: #144d14;
    --glow-1: 0 0 4px rgba(51,255,51,.7), 0 0 14px rgba(51,255,51,.35);
    --glow-2: 0 0 4px rgba(26,255,102,.7), 0 0 14px rgba(26,255,102,.35);
    --glow-green: 0 0 14px rgba(51,255,51,.5);
    --glow-red: 0 0 14px rgba(255,51,51,.5);
    --card-radius: 0;
    --card-clip: none;
    --bg-layers:
      repeating-linear-gradient(0deg, rgba(51,255,51,.06) 0px, rgba(51,255,51,.06) 1px, transparent 1px, transparent 2px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.65) 100%);
    --scanline-opacity: .3;
    --font-display: 'VT323', monospace;
    --font-body: 'VT323', ui-monospace, 'Courier New', monospace;
    --btn-text-on-accent: #000502;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg-layers), var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
    position: relative;
    transition: background .3s ease, color .3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,var(--scanline-opacity)) 3px);
    mix-blend-mode: multiply;
  }

  .layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    width: 100%;
    max-width: 860px;
    justify-content: center;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 540px;
    margin: 0 auto 20px;
  }

  h1 {
    font-family: var(--font-display);
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow-1);
    letter-spacing: .18em;
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
    width: 100%;
    max-width: 540px;
  }

  select, button.ctrl {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 14px;
    font-size: .8rem;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: .04em;
    cursor: pointer;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  select:hover, button.ctrl:hover { border-color: var(--accent); background: var(--surface2); box-shadow: var(--glow-1); }
  select { flex: 1; min-width: 160px; }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 540px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow: var(--glow-1);
    transition: width .4s ease;
  }
  .progress-label { font-size: .8rem; color: var(--muted); white-space: nowrap; }

  /* Card scene */
  .scene {
    width: 100%;
    max-width: 540px;
    height: 280px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 28px;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--card-radius);
    clip-path: var(--card-clip);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    border: 1px solid var(--border);
    user-select: none;
    transition: background .3s ease, border-color .3s ease, box-shadow .3s ease;
  }

  .card-front {
    background: var(--surface);
    box-shadow: var(--glow-1);
    border-color: var(--accent);
  }
  .card-back {
    background: var(--surface2);
    box-shadow: var(--glow-2);
    border-color: var(--accent2);
    transform: rotateY(180deg);
  }

  .card-label {
    font-family: var(--font-display);
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .2em;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .card-word {
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
  }
  .card-front .card-word { color: var(--accent); text-shadow: var(--glow-1); }
  .card-back .card-word { color: var(--accent2); text-shadow: var(--glow-2); }

  .card-lesson {
    position: absolute;
    bottom: 16px;
    font-size: .7rem;
    color: var(--muted);
  }

  .card-speak {
    display: none;
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    transition: border-color .15s, box-shadow .15s, color .15s;
  }
  .card-speak.visible { display: flex; }
  .card-speak:hover { border-color: var(--accent); color: var(--text); box-shadow: var(--glow-1); }
  .card-speak:focus:not(:focus-visible) { outline: none; }

  .card-hint {
    margin-top: 20px;
    font-size: .75rem;
    color: var(--muted);
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }

  .btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn:active { transform: scale(.92); }

  .btn-no  { background: var(--surface-red);   color: var(--red);   box-shadow: 0 0 0 2px var(--red),   var(--glow-red); }
  .btn-yes { background: var(--surface-green); color: var(--green); box-shadow: 0 0 0 2px var(--green), var(--glow-green); }
  .btn-no:hover  { box-shadow: 0 0 0 2px var(--red),   var(--glow-red); }
  .btn-yes:hover { box-shadow: 0 0 0 2px var(--green), var(--glow-green); }

  .btn-skip {
    width: 48px; height: 48px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    align-self: center;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, box-shadow .15s;
  }
  .btn-skip:hover { border-color: var(--accent); color: var(--text); box-shadow: var(--glow-1); }

  /* Mode toggle */
  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .mode-btn {
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: .04em;
    font-size: .78rem;
    cursor: pointer;
    transition: all .15s;
  }
  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--btn-text-on-accent);
    box-shadow: var(--glow-1);
    font-weight: 700;
  }

  /* Done screen */
  .done {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .done.visible { display: flex; }
  .done-emoji { font-size: 3rem; filter: drop-shadow(0 0 10px var(--accent)); }
  .done h2 { font-family: var(--font-display); font-size: 1.3rem; color: var(--accent); text-shadow: var(--glow-1); text-transform: uppercase; letter-spacing: .08em; }
  .done p { color: var(--muted); font-size: .9rem; }
  .done button {
    margin-top: 8px;
    padding: 12px 28px;
    background: var(--accent);
    color: var(--btn-text-on-accent);
    border: none;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: var(--glow-1);
    transition: background .15s, box-shadow .15s;
  }
  .done button:hover { background: var(--accent2); box-shadow: var(--glow-2); }

  .main { flex: 0 0 540px; min-width: 0; display: flex; flex-direction: column; align-items: center; }

  /* Sidebar */
  .sidebar {
    flex: 0 0 200px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: sticky;
    top: 24px;
    max-height: calc(100vh - 48px);
  }

  .slist {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 80px;
    max-height: calc(50vh - 32px);
  }

  .slist-header {
    padding: 10px 14px;
    font-family: var(--font-display);
    font-size: .65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .slist-header.correct { color: var(--green); text-shadow: var(--glow-green); }
  .slist-header.wrong   { color: var(--red); text-shadow: var(--glow-red); }

  .slist-count {
    font-size: .8rem;
    font-weight: 700;
    opacity: .8;
  }

  .slist-items {
    overflow-y: auto;
    flex: 1;
    padding: 6px 0;
  }

  .slist-item {
    padding: 6px 14px;
    font-size: .78rem;
    line-height: 1.4;
    border-bottom: 1px solid var(--border);
    animation: fadeIn .2s ease;
  }
  .slist-item:last-child { border-bottom: none; }
  .slist-item .word-ru { color: var(--accent); font-weight: 600; }
  .slist-item .word-en { color: var(--muted); font-size: .72rem; }
  #listCorrect .word-ru { color: var(--green); }
  #listWrong .word-ru { color: var(--red); }
  .miss-badge { color: var(--red); font-weight: 700; font-size: .68rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  @media (max-width: 700px) {
    .layout { flex-direction: column; align-items: center; }
    .sidebar { flex-direction: row; position: static; flex: none; width: 100%; max-width: 540px; max-height: none; }
    .slist { flex: 1; max-height: 160px; }
  }

  /* Type mode */
  .type-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 540px;
    margin-bottom: 20px;
  }
  .type-area.visible { display: flex; }

  .type-input-row {
    display: flex;
    width: 100%;
    gap: 10px;
  }

  #typeInput {
    flex: 1;
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--border);
    border-radius: 2px;
    padding: 14px 18px;
    font-size: 1.1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    font-family: inherit;
  }
  #typeInput:focus { border-color: var(--accent); box-shadow: var(--glow-1); }
  #typeInput.correct { border-color: var(--green); background: var(--surface-green); box-shadow: var(--glow-green); }
  #typeInput.wrong   { border-color: var(--red);   background: var(--surface-red);   box-shadow: var(--glow-red); }

  #typeSubmit {
    padding: 0 20px;
    background: var(--accent);
    color: var(--btn-text-on-accent);
    border: none;
    border-radius: 2px;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: .04em;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--glow-1);
    transition: background .15s, box-shadow .15s;
  }
  #typeSubmit:hover { background: var(--accent2); box-shadow: var(--glow-2); }

  .type-feedback {
    font-size: .9rem;
    min-height: 1.4em;
    text-align: center;
  }
  .type-feedback.correct { color: var(--green); text-shadow: var(--glow-green); }
  .type-feedback.wrong   { color: var(--red); text-shadow: var(--glow-red); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Russian Flashcards</h1>
  <button class="btn-skip" id="themeToggle" title="Cycle theme"></button>
</div>

<div class="layout">
<div class="main" id="main">
  <!-- Controls -->
  <div class="controls">
    <select id="lessonFilter">
      <option value="all">All lessons</option>
      <option value="1">Урок 1 — Приветствия</option>
      <option value="2">Урок 2 — Вежливые выражения</option>
      <option value="3">Урок 3 — Возраст</option>
      <option value="4">Урок 4 — Семья</option>
      <option value="5">Урок 5 — У меня есть</option>
      <option value="6">Урок 6 — Практический урок</option>
      <option value="7">Урок 7 — Работа и профессии</option>
      <option value="8">Урок 8 — Внешность</option>
      <option value="9">Урок 9 — Погода</option>
    </select>
    <button class="ctrl" id="restartBtn">↺ Restart</button>
  </div>

  <!-- Direction -->
  <div class="mode-row">
    <button class="mode-btn" data-mode="ru">RU → EN</button>
    <button class="mode-btn active" data-mode="en">EN → RU</button>
    <button class="mode-btn" data-mode="random">Random</button>
  </div>
  <!-- Input method -->
  <div class="mode-row">
    <button class="mode-btn active" data-input="flip">Flip</button>
    <button class="mode-btn" data-input="type">⌨ Type</button>
  </div>

  <!-- Progress -->
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>

  <!-- Card -->
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="card-face card-front">
        <button class="card-speak" id="speakFront" title="Pronounce">🔊</button>
        <div class="card-label" id="frontLabel">Russian</div>
        <div class="card-word" id="frontWord"></div>
        <div class="card-hint">tap to reveal</div>
        <div class="card-lesson" id="cardLesson"></div>
      </div>
      <div class="card-face card-back">
        <button class="card-speak" id="speakBack" title="Pronounce">🔊</button>
        <div class="card-label" id="backLabel">English</div>
        <div class="card-word" id="backWord"></div>
        <div class="card-lesson" id="cardLesson2"></div>
      </div>
    </div>
  </div>

  <!-- Type input (type mode only) -->
  <div class="type-area" id="typeArea">
    <div class="type-input-row">
      <input type="text" id="typeInput" placeholder="Type your answer…" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="typeSubmit">Check</button>
    </div>
    <div class="type-feedback" id="typeFeedback"></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-no"  id="btnNo"  title="Again">✗</button>
    <button class="btn-skip"    id="btnSkip" title="Skip">→</button>
    <button class="btn btn-yes" id="btnYes" title="Got it">✓</button>
  </div>

  <!-- Done -->
  <div class="done" id="doneScreen">
    <div class="done-emoji">🎉</div>
    <h2>Deck complete!</h2>
    <p id="doneStats"></p>
    <button id="doneRestart">Play again</button>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="slist">
    <div class="slist-header correct">✓ Got it <span class="slist-count" id="countCorrect">0</span></div>
    <div class="slist-items" id="listCorrect"></div>
  </div>
  <div class="slist">
    <div class="slist-header wrong">✗ Again <span class="slist-count" id="countWrong">0</span></div>
    <div class="slist-items" id="listWrong"></div>
  </div>
</div>

</div><!-- .layout -->

<script>
const VOCAB = [
  // Урок 1 — Приветствия
  {ru:"Привет!",en:"Hi!",l:1},
  {ru:"Здравствуйте!",en:"Hello! (formal)",l:1},
  {ru:"Как дела?",en:"How are you?",l:1},
  {ru:"Хорошо!",en:"Good!",l:1},
  {ru:"Отлично!",en:"Excellent!",l:1},
  {ru:"Нормально",en:"OK / Normal",l:1},

const LESSON_NAMES = {1:"Урок 1",2:"Урок 2",3:"Урок 3",4:"Урок 4",5:"Урок 5",6:"Урок 6",7:"Урок 7",8:"Урок 8",9:"Урок 9"};

// State
let deck = [], done = 0, total = 0, mode = 'en', inputMode = 'flip', flipped = false, current = null, typeChecked = false, busy = false;

const typeArea     = document.getElementById('typeArea');
const typeInput    = document.getElementById('typeInput');
const typeSubmit   = document.getElementById('typeSubmit');
const typeFeedback = document.getElementById('typeFeedback');

function normalize(s) {
  // lowercase, strip combining accents (stress marks), trim punctuation
  return s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[!?.…,]/g, '').trim();
}

function checkType() {
  if (typeChecked) { answer(typeInput.classList.contains('correct')); return; }
  typeChecked = true;

  const guess = normalize(typeInput.value);
  const expected = normalize(current._cardMode === 'ru' ? current.en : current.ru);

  // Accept if fully contained or contains (handles partial matches like "m/f" variants)
  const correct = guess === expected
    || expected.includes(guess) && guess.length > 2
    || guess.includes(expected) && expected.length > 2;

  if (correct) {
    typeInput.classList.add('correct');
    typeFeedback.textContent = '✓ Correct!';
    typeFeedback.className = 'type-feedback correct';
  } else {
    typeInput.classList.add('wrong');
    typeFeedback.textContent = `✗  ${current._cardMode === 'ru' ? current.en : current.ru}`;
    typeFeedback.className = 'type-feedback wrong';
  }

  // Flip card to show answer
  flipped = true;
  card.classList.add('flipped');
  typeSubmit.textContent = correct ? '✓ Next' : '✗ Next';
}

const card       = document.getElementById('card');
const frontWord  = document.getElementById('frontWord');
const backWord   = document.getElementById('backWord');
const frontLabel = document.getElementById('frontLabel');
const backLabel  = document.getElementById('backLabel');
const cardLesson = document.getElementById('cardLesson');
const cardLesson2= document.getElementById('cardLesson2');
const speakFront = document.getElementById('speakFront');
const speakBack  = document.getElementById('speakBack');
const speechSupported = 'speechSynthesis' in window;
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const doneScreen = document.getElementById('doneScreen');
const doneStats  = document.getElementById('doneStats');
const scene      = document.getElementById('scene');
const listCorrect  = document.getElementById('listCorrect');
const listWrong    = document.getElementById('listWrong');
const countCorrect = document.getElementById('countCorrect');
const countWrong   = document.getElementById('countWrong');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function addSidebarEntry(list, countEl, item) {
  const el = document.createElement('div');
  el.className = 'slist-item';
  el.innerHTML = `<div class="word-ru">${item.ru}</div><div class="word-en">${item.en}</div>`;
  list.prepend(el);
  countEl.textContent = list.children.length;
}

// Wrong answers keep re-queuing the same card until it's answered correctly.
// Track one sidebar row per word (keyed by object identity) instead of adding
// a duplicate row every time the same card is missed again.
const wrongEntries = new Map();

function addWrongEntry(item) {
  // Show only the prompt side (whichever side was on the front when missed) —
  // never the answer, so the sidebar doesn't give it away.
  const promptText = item._cardMode === 'ru' ? item.ru : item.en;
  if (wrongEntries.has(item)) {
    const entry = wrongEntries.get(item);
    entry.count++;
    entry.badge.textContent = `×${entry.count}`;
    listWrong.prepend(entry.el);
  } else {
    const el = document.createElement('div');
    el.className = 'slist-item';
    el.innerHTML = `<div class="word-ru">${promptText} <span class="miss-badge"></span></div>`;
    listWrong.prepend(el);
    wrongEntries.set(item, { el, badge: el.querySelector('.miss-badge'), count: 1 });
  }
  countWrong.textContent = wrongEntries.size;
}

function clearSidebar() {
  listCorrect.innerHTML = '';
  listWrong.innerHTML   = '';
  countCorrect.textContent = '0';
  countWrong.textContent   = '0';
  wrongEntries.clear();
}

function buildDeck() {
  busy = false;
  const filter = document.getElementById('lessonFilter').value;
  const source = filter === 'all' ? VOCAB : VOCAB.filter(v => v.l == filter);
  deck = shuffle([...source]);
  done = 0; total = deck.length;
  doneScreen.classList.remove('visible');
  scene.style.display = '';
  document.querySelector('.actions').style.display = '';
  const isType = inputMode === 'type';
  typeArea.classList.toggle('visible', isType);
  scene.style.cursor = isType ? 'default' : 'pointer';
  clearSidebar();
  showNext();
}

function showNext() {
  if (deck.length === 0) { busy = false; showDone(); return; }

  current = deck[deck.length - 1];
  const cardMode = mode === 'random' ? (Math.random() < .5 ? 'ru' : 'en') : mode;
  current._cardMode = cardMode;

  const wasFlipped = flipped;
  flipped = false;
  card.classList.remove('flipped');

  const applyContent = () => {
    if (cardMode === 'ru') {
      frontLabel.textContent = 'Russian';
      backLabel.textContent  = 'English';
      frontWord.textContent  = current.ru;
      backWord.textContent   = current.en;
    } else {
      frontLabel.textContent = 'English';
      backLabel.textContent  = 'Russian';
      frontWord.textContent  = current.en;
      backWord.textContent   = current.ru;
    }
    const ln = LESSON_NAMES[current.l] || '';
    cardLesson.textContent  = ln;
    cardLesson2.textContent = ln;

    speakFront.classList.toggle('visible', speechSupported && cardMode === 'ru');
    speakBack.classList.toggle('visible', speechSupported && cardMode === 'en');
  };

  // Wait for flip-back animation before revealing new content
  if (wasFlipped) setTimeout(applyContent, 450);
  else applyContent();

  // Reset type mode UI
  if (inputMode === 'type') {
    const reset = () => {
      typeInput.value = '';
      typeInput.className = '';
      typeFeedback.textContent = '';
      typeFeedback.className = 'type-feedback';
      typeSubmit.textContent = 'Check';
      typeChecked = false;
      typeInput.focus();
    };
    if (wasFlipped) setTimeout(reset, 450);
    else reset();
  }

  updateProgress();
  busy = false;
}

function flipCard() {
  if (busy) return;
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
}

function answer(known) {
  if (busy) return;
  if (inputMode === 'type' && !typeChecked) return; // must check first
  if (!flipped) { flipCard(); return; } // force reveal first
  busy = true;
  deck.pop();
  if (!known) {
    deck.unshift(current);
    addWrongEntry(current);
  } else {
    done++;
    if (!wrongEntries.has(current)) addSidebarEntry(listCorrect, countCorrect, current);
  }
  setTimeout(showNext, 200);
}

function updateProgress() {
  const pct = total ? (done / total * 100) : 0;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${done} / ${total}`;
}

function showDone() {
  updateProgress();
  scene.style.display = 'none';
  document.querySelector('.actions').style.display = 'none';
  typeArea.classList.remove('visible');
  doneStats.textContent = `You knew ${done} out of ${total} cards.`;
  doneScreen.classList.add('visible');
}

// Type mode events
typeSubmit.addEventListener('click', checkType);
typeInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); checkType(); }
});

// Theme selector
const THEMES = ['cyberpunk', 'retro', 'classic', 'terminal'];
const THEME_META = {
  cyberpunk: { icon: '🌆', name: 'Cyberpunk' },
  retro:     { icon: '🌴', name: 'Retro 80s' },
  classic:   { icon: '🟣', name: 'Classic' },
  terminal:  { icon: '💻', name: 'Terminal' },
};
const themeToggle = document.getElementById('themeToggle');
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  const meta = THEME_META[t];
  themeToggle.textContent = meta.icon;
  themeToggle.title = `Theme: ${meta.name} (click to change)`;
}
applyTheme(document.documentElement.dataset.theme);
themeToggle.addEventListener('click', () => {
  const next = THEMES[(THEMES.indexOf(document.documentElement.dataset.theme) + 1) % THEMES.length];
  localStorage.setItem('rf-theme', next);
  applyTheme(next);
});

// Events
scene.addEventListener('click', () => { if (deck.length && inputMode !== 'type') flipCard(); });
document.getElementById('btnNo').addEventListener('click',  () => answer(false));
document.getElementById('btnYes').addEventListener('click', () => answer(true));
document.getElementById('btnSkip').addEventListener('click', () => {
  if (busy || !deck.length) return;
  deck.pop();
  deck.unshift(current);
  showNext();
});
[speakFront, speakBack].forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation(); // don't let it also trigger the card flip
    if (!current || !speechSupported) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(current.ru);
    u.lang = 'ru-RU';
    speechSynthesis.speak(u);
  });
});
document.getElementById('restartBtn').addEventListener('click', buildDeck);
document.getElementById('doneRestart').addEventListener('click', buildDeck);
document.getElementById('lessonFilter').addEventListener('change', buildDeck);

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    buildDeck();
  });
});

document.querySelectorAll('[data-input]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-input]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    inputMode = btn.dataset.input;
    buildDeck();
  });
});

// Keyboard — disabled when focus is in type input
document.addEventListener('keydown', e => {
  if (inputMode === 'type') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'l') answer(true);
  if (e.key === 'ArrowLeft'  || e.key === 'h') answer(false);
  if (e.key === 'ArrowDown'  || e.key === 'j') {
    if (busy || !deck.length) return;
    deck.pop(); deck.unshift(current); showNext();
  }
});

buildDeck();
